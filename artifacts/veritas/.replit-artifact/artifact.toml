kind = "web"
previewPath = "/"
title = "Veritas"
version = "1.0.0"
id = "artifacts/veritas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20981

[services.development]
run = "pnpm --filter @workspace/veritas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/veritas", "run", "build" ]
publicDir = "artifacts/veritas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20981"
BASE_PATH = "/"
